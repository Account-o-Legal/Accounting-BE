services:
  api:
    build: .
    ports: ["8000:8000"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/accounting
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
    depends_on: [db, redis, minio]
    volumes: ["./app:/app/app"]

  worker:
    build: .
    command: ["arq", "app.workers.main.WorkerSettings"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/accounting
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
    depends_on: [db, redis, minio]

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: accounting
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    # Optional: Un-comment the line below if you want Redis data to persist across restarts
    # volumes: ["redisdata:/data"]

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    # FIX: Map a volume so your files and buckets aren't wiped on restart
    volumes: ["miniodata:/data"]

volumes:
  pgdata:
  miniodata: # Declared the persistent volume for MinIO
  # redisdata: # Un-comment if using persistent Redis